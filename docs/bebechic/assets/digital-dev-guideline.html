  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-system,BlinkMacSystemFont,'Segoe UI',sans-serif}\n  :root{\n    --bb-tiffany:#8FD8C3;\n    --bb-tiffany-dark:#6BC4AB;\n    --bb-caribbean:#176676;\n    --bb-caribbean-deep:#0E4452;\n    --bb-tiffany-50:#F0FAF7;\n    --bb-tiffany-100:#D6F2EA;\n    --bb-obsidian:#0D1F26;\n    --bb-ink:#1A3540;\n    --bb-slate:#4A6572;\n    --bb-mist:#8FA8B3;\n    --bb-border:#D4E2E7;\n    --bb-paper:#F4F8F9;\n    --bb-white:#FFFFFF;\n    --bb-puce:#D37E94;\n    --bb-puce-deep:#A55B70;\n    --bb-puce-tint:#FBE8ED;\n    --bb-amber:#F59E0B;\n    --bb-success:#0B8A5C;\n    --bb-danger:#A55B70;\n    --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-full:9999px;\n  }\n  body{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:var(--bb-obsidian);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}\n  .wrap{max-width:880px;margin:0 auto;padding:2rem 1.5rem 4rem}\n\n  /* NAV */\n  .nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2.5rem;padding:10px;background:var(--bb-paper);border-radius:var(--r-xl);border:1px solid var(--bb-border)}\n  .nav button{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border:none;border-radius:var(--r-full);background:transparent;color:var(--bb-slate);cursor:pointer;transition:all .18s}\n  .nav button.active{background:var(--bb-caribbean);color:#fff}\n  .nav button:hover:not(.active){background:var(--bb-tiffany-100);color:var(--bb-caribbean)}\n\n  /* SECTIONS */\n  .section{display:none}.section.show{display:block}\n  .section-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bb-tiffany-dark);margin-bottom:.5rem}\n  .h1{font-size:32px;font-weight:700;line-height:1.2;color:var(--bb-obsidian);margin-bottom:.5rem}\n  .h2{font-size:22px;font-weight:600;color:var(--bb-obsidian);margin-bottom:.75rem}\n  .h3{font-size:16px;font-weight:600;color:var(--bb-ink);margin-bottom:.5rem}\n  .lead{font-size:16px;color:var(--bb-slate);line-height:1.7;margin-bottom:2rem}\n  .divider{height:1px;background:var(--bb-border);margin:2rem 0}\n  .row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}\n  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}\n  .card{background:var(--bb-white);border:1px solid var(--bb-border);border-radius:var(--r-lg);padding:1.25rem}\n  .label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bb-mist);margin-bottom:.4rem}\n  .mono{font-family:monospace;font-size:12px}\n\n  /* COVER */\n  .cover{background:var(--bb-obsidian);border-radius:var(--r-xl);padding:3rem;margin-bottom:2rem;position:relative;overflow:hidden}\n  .cover::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(143,216,195,.15),transparent 70%)}\n  .cover-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bb-tiffany);border:1px solid rgba(143,216,195,.3);padding:5px 12px;border-radius:var(--r-full);margin-bottom:1.25rem}\n  .cover-logo{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}\n  .cover-logo-icon{width:44px;height:44px;background:var(--bb-tiffany);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}\n  .cover-logo-text{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.01em}\n  .cover-logo-dot{color:var(--bb-tiffany)}\n  .cover-h{font-size:36px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.75rem}\n  .cover-sub{font-size:15px;color:rgba(255,255,255,.55);line-height:1.6}\n  .cover-meta{display:flex;gap:1.5rem;margin-top:2rem}\n  .cover-meta-item{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.06em;text-transform:uppercase}\n  .cover-meta-val{display:block;font-size:14px;color:rgba(255,255,255,.8);font-weight:600;letter-spacing:0;text-transform:none;margin-top:2px}\n\n  /* COLORS */\n  .swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem}\n  .swatch{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--bb-border)}\n  .swatch-block{height:72px}\n  .swatch-info{padding:.6rem .75rem;background:var(--bb-white)}\n  .swatch-name{font-size:12px;font-weight:600;color:var(--bb-ink)}\n  .swatch-hex{font-family:monospace;font-size:11px;color:var(--bb-mist)}\n  .swatch-role{font-size:11px;color:var(--bb-slate);margin-top:2px}\n  .rule-60-30-10{display:grid;grid-template-columns:6fr 3fr 1fr;gap:6px;height:48px;margin:1.25rem 0;border-radius:var(--r-md);overflow:hidden}\n  .rule-60{background:var(--bb-paper);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bb-slate)}\n  .rule-30{background:var(--bb-caribbean);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.9)}\n  .rule-10{background:var(--bb-puce);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}\n  .neutral-row{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:1rem 0;height:36px;border-radius:var(--r-md);overflow:hidden}\n  .neutral-cell{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}\n\n  /* TYPOGRAPHY */\n  .type-row{display:flex;align-items:baseline;gap:1.5rem;padding:1rem 0;border-bottom:1px solid var(--bb-border)}\n  .type-row:last-child{border-bottom:none}\n  .type-meta{min-width:120px;font-size:11px;color:var(--bb-mist);font-weight:500}\n  .type-meta b{display:block;font-size:12px;color:var(--bb-slate);margin-bottom:2px}\n  .t-display-xl{font-size:52px;font-weight:700;line-height:1.1;color:var(--bb-obsidian);letter-spacing:-.02em}\n  .t-display-l{font-size:38px;font-weight:700;line-height:1.15;color:var(--bb-obsidian);letter-spacing:-.015em}\n  .t-h1{font-size:28px;font-weight:700;color:var(--bb-obsidian)}\n  .t-h2{font-size:22px;font-weight:600;color:var(--bb-obsidian)}\n  .t-h3{font-size:17px;font-weight:600;color:var(--bb-ink)}\n  .t-body-l{font-size:17px;font-weight:400;color:var(--bb-slate);line-height:1.7}\n  .t-body{font-size:15px;font-weight:400;color:var(--bb-slate)}\n  .t-small{font-size:13px;color:var(--bb-mist)}\n  .t-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bb-slate)}\n\n  /* LOGO */\n  .logo-variants{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin:1rem 0}\n  .logo-box{border-radius:var(--r-lg);padding:2rem;display:flex;align-items:center;justify-content:center;border:1px solid var(--bb-border);position:relative;flex-direction:column;gap:.75rem}\n  .logo-box.dark{background:var(--bb-obsidian);border-color:transparent}\n  .logo-box.tiffany{background:var(--bb-tiffany);border-color:transparent}\n  .logo-symbol{width:40px;height:40px}\n  .logo-wordmark{font-size:18px;font-weight:700;letter-spacing:-.01em}\n  .logo-wordmark .dot{color:var(--bb-puce)}\n  .logo-label{font-size:10px;font-weight:500;color:var(--bb-mist);letter-spacing:.06em;text-transform:uppercase;position:absolute;bottom:10px}\n  .logo-label.dark{color:rgba(255,255,255,.35)}\n  .logo-label.tiff{color:rgba(23,102,118,.6)}\n  .dont-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-top:1rem}\n  .dont-box{border-radius:var(--r-md);padding:1rem;border:1px solid var(--bb-border);text-align:center}\n  .dont-label{font-size:11px;color:var(--bb-mist);margin-top:.5rem}\n\n  /* SPACING */\n  .spacing-row{display:flex;align-items:center;gap:1.5rem;padding:.75rem 0;border-bottom:1px solid var(--bb-border)}\n  .spacing-row:last-child{border-bottom:none}\n  .spacing-bar-wrap{flex:1}\n  .spacing-bar{background:var(--bb-tiffany-100);border-radius:3px;height:12px;border:1px solid var(--bb-tiffany)}\n  .spacing-meta{min-width:140px;font-size:12px;color:var(--bb-slate)}\n  .spacing-meta b{display:block;font-size:13px;font-weight:600;color:var(--bb-ink)}\n  .spacing-token{font-family:monospace;font-size:11px;color:var(--bb-tiffany-dark);display:block}\n\n  /* COMPONENTS */\n  .comp-section{margin-bottom:2.5rem}\n  .comp-bg{background:var(--bb-paper);border-radius:var(--r-xl);padding:2rem;border:1px solid var(--bb-border);margin-top:1rem}\n  .comp-row{display:flex;flex-wrap:wrap;gap:1rem;align-items:center}\n  /* Buttons */\n  .btn{font-family:'Be Vietnam Pro',sans-serif;font-size:14px;font-weight:600;padding:10px 22px;border-radius:var(--r-md);border:none;cursor:pointer;transition:all .15s}\n  .btn-primary{background:var(--bb-caribbean);color:#fff}\n  .btn-primary:hover{background:var(--bb-caribbean-deep)}\n  .btn-secondary{background:var(--bb-tiffany);color:var(--bb-caribbean);border:1.5px solid var(--bb-tiffany)}\n  .btn-outline{background:transparent;color:var(--bb-caribbean);border:1.5px solid var(--bb-caribbean)}\n  .btn-ghost{background:transparent;color:var(--bb-slate);border:1.5px solid var(--bb-border)}\n  .btn-danger{background:var(--bb-puce-tint);color:var(--bb-puce-deep);border:1.5px solid var(--bb-puce)}\n  .btn-sm{font-size:12px;padding:7px 14px}\n  .btn-lg{font-size:16px;padding:13px 28px}\n  /* Badges */\n  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--r-full);letter-spacing:.03em}\n  .badge-success{background:#D1FAE5;color:#065F46}\n  .badge-warn{background:#FEF3C7;color:#92400E}\n  .badge-error{background:var(--bb-puce-tint);color:var(--bb-puce-deep)}\n  .badge-info{background:var(--bb-tiffany-100);color:var(--bb-caribbean)}\n  .badge-neutral{background:var(--bb-paper);color:var(--bb-slate);border:1px solid var(--bb-border)}\n  /* Input */\n  .inp{font-family:'Be Vietnam Pro',sans-serif;font-size:14px;padding:9px 14px;border:1.5px solid var(--bb-border);border-radius:var(--r-md);width:100%;outline:none;color:var(--bb-obsidian);background:#fff;transition:border .15s}\n  .inp:focus{border-color:var(--bb-caribbean)}\n  .inp-wrap{position:relative;width:220px}\n  .inp-label{font-size:12px;font-weight:500;color:var(--bb-slate);margin-bottom:4px}\n  /* Card */\n  .product-card{background:#fff;border:1px solid var(--bb-border);border-radius:var(--r-xl);overflow:hidden;width:200px}\n  .product-img{height:120px;background:linear-gradient(135deg,var(--bb-tiffany-100),var(--bb-tiffany));display:flex;align-items:center;justify-content:center}\n  .product-body{padding:1rem}\n  .product-name{font-size:13px;font-weight:600;color:var(--bb-ink);margin-bottom:4px}\n  .product-price{font-size:18px;font-weight:700;color:var(--bb-obsidian)}\n  .product-price-old{font-size:12px;color:var(--bb-mist);text-decoration:line-through;margin-left:6px}\n  .product-actions{display:flex;gap:6px;margin-top:.75rem}\n  /* Sidebar preview */\n  .sidebar-demo{background:var(--bb-obsidian);border-radius:var(--r-xl);padding:1.25rem;width:200px}\n  .sd-logo{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.1)}\n  .sd-logo-icon{width:28px;height:28px;background:var(--bb-tiffany);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n  .sd-logo-name{font-size:13px;font-weight:700;color:#fff}\n  .sd-nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r-sm);margin-bottom:2px;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}\n  .sd-nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}\n  .sd-nav-item.active{background:rgba(143,216,195,.15);color:var(--bb-tiffany)}\n  .sd-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}\n  /* Status badge in sidebar */\n  .sd-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:var(--r-full);background:rgba(143,216,195,.2);color:var(--bb-tiffany);margin-left:auto}\n  /* Table */\n  .data-table{width:100%;border-collapse:collapse;font-size:13px}\n  .data-table th{text-align:left;font-size:11px;font-weight:600;color:var(--bb-mist);letter-spacing:.06em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--bb-border)}\n  .data-table td{padding:10px 14px;border-bottom:1px solid var(--bb-border);color:var(--bb-ink)}\n  .data-table tr:last-child td{border-bottom:none}\n  .data-table tr:hover td{background:var(--bb-paper)}\n  /* Voice dos/donts */\n  .voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}\n  .voice-box{border-radius:var(--r-lg);padding:1.25rem}\n  .voice-do{background:#F0FDF4;border:1px solid #BBF7D0}\n  .voice-dont{background:var(--bb-puce-tint);border:1px solid #FCA5A5}\n  .voice-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem}\n  .voice-tag.do{color:#16A34A}\n  .voice-tag.dont{color:var(--bb-puce-deep)}\n  .voice-item{font-size:13px;color:var(--bb-ink);padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}\n  .voice-item:last-child{border-bottom:none}\n\n  /* DARK PREVIEW */\n  .dark-preview{background:var(--bb-obsidian);border-radius:var(--r-xl);padding:2rem;margin-top:1rem}\n  .dp-h{font-size:22px;font-weight:700;color:#fff;margin-bottom:.5rem}\n  .dp-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:1.5rem}\n  .dp-row{display:flex;gap:1rem;flex-wrap:wrap}\n  .dp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-lg);padding:1.25rem;flex:1;min-width:140px}\n  .dp-num{font-size:26px;font-weight:700;color:#fff}\n  .dp-label{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}\n  .dp-accent{color:var(--bb-tiffany)}\n\n  /* ACTIVE TAB PILL */\n  .tab-active-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--r-full);background:var(--bb-tiffany-100);color:var(--bb-caribbean)}\n\n  /* RADIUS DEMO */\n  .radius-demo{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0;align-items:center}\n  .r-box{background:var(--bb-tiffany-100);border:1px solid var(--bb-tiffany);width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--bb-caribbean-deep)}\n\n  /* SHADOW DEMO */\n  .shadow-row{display:flex;gap:1.5rem;margin:1rem 0}\n  .sh-box{background:#fff;border-radius:var(--r-lg);padding:1.25rem;font-size:12px;font-weight:500;color:var(--bb-slate);text-align:center;min-width:100px}\n  .sh-xs{box-shadow:0 1px 3px rgba(23,102,118,.08)}\n  .sh-sm{box-shadow:0 2px 8px rgba(23,102,118,.12)}\n  .sh-md{box-shadow:0 4px 16px rgba(23,102,118,.14)}\n  .sh-lg{box-shadow:0 8px 32px rgba(23,102,118,.16)}\n<\u002Fstyle>\n\n<\u002Fhead><body><div class=\"wrap\">\n\n  <div class=\"cover\">\n    <div class=\"cover-badge\">Brand Guidelines v2.0 — Digital Edition<\u002Fdiv>\n    <div class=\"cover-logo\">\n      <div class=\"cover-logo-icon\">\n        <img src=\"5d37877b-06f0-4eb9-9b91-876d2448ec72\" alt=\"BEBECHIC\" width=\"28\" height=\"28\" style=\"object-fit:contain;display:block\">\n      <\u002Fdiv>\n      <img src=\"bb65b32c-dc04-4819-a2c7-549822387c41\" alt=\"BEBECHIC\" style=\"height:26px;display:block;width:auto\">\n    <\u002Fdiv>\n    <div class=\"cover-h\">Beside You,<br>Blooming Daily.<\u002Fdiv>\n    <div class=\"cover-sub\">Thời trang &amp; chăm sóc cá nhân dành cho phụ nữ hiện đại.<br>Phiên bản guidelines dành riêng cho nền tảng digital.<\u002Fdiv>\n    <div class=\"cover-meta\">\n      <div class=\"cover-meta-item\">Version<span class=\"cover-meta-val\">2.0 Digital<\u002Fspan><\u002Fdiv>\n      <div class=\"cover-meta-item\">Font<span class=\"cover-meta-val\">Be Vietnam Pro<\u002Fspan><\u002Fdiv>\n      <div class=\"cover-meta-item\">Base color<span class=\"cover-meta-val\">#8FD8C3 · #176676<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <nav class=\"nav\">\n    <button class=\"active\" onclick=\"show('brand',this)\">Brand DNA<\u002Fbutton>\n    <button onclick=\"show('colors',this)\">Màu sắc<\u002Fbutton>\n  đặc biệt.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:var(--bb-puce-tint);border-color:#f6c8d2\">\n        <div class=\"label\" style=\"color:var(--bb-puce-deep)\">Vision<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:600;color:var(--bb-puce-deep);line-height:1.4;margin-bottom:.5rem\">Trở thành người bạn thân của mọi phụ nữ.<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--bb-slate);line-height:1.6\">Đến năm 2030, BEBECHIC là cái tên đầu tiên phụ nữ Việt nghĩ đến khi cần một sản phẩm chăm sóc bản thân nhỏ mà chất.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\" style=\"margin-top:2rem\">Brand Pillars — 4 cột trụ<\u002Fdiv>\n    <div class=\"row\" style=\"margin:1rem 0;grid-template-columns:1fr 1fr 1fr 1fr;gap:.75rem\">\n      <div class=\"card\" style=\"text-align:center\">\n        <div style=\"width:48px;height:48px;border-radius:50%;background:var(--bb-tiffany);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px;font-weight:700;color:var(--bb-caribbean)\">01<\u002Fdiv>\n        <div class=\"h3\">Tinh tế<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--bb-slate);line-height:1.5\">Chi tiết nhỏ kể câu chuyện lớn. Mọi đường nét đều có ý đồ.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\">\n        <div style=\"width:48px;height:48px;border-radius:50%;background:var(--bb-tiffany);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px;font-weight:700;color:var(--bb-caribbean)\">02<\u002Fdiv>\n        <div class=\"h3\">Tiện lợi<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--bb-slate);line-height:1.5\">Giải pháp thực tế, dùng được ngay, không cần học.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\">\n        <div style=\"width:48px;height:48px;border-radius:50%;background:var(--bb-tiffany);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px;font-weight:700;color:var(--bb-caribbean)\">03<\u002Fdiv>\n        <div class=\"h3\">Đáng yêu<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--bb-slate);line-height:1.5\">Giữ chất nữ tính, ấm áp — không cứng nhắc, không sến súa.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\">\n        <div style=\"width:48px;height:48px;border-radius:50%;background:var(--bb-tiffany);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px;font-weight:700;color:var(--bb-caribbean)\">04<\u002Fdiv>\n        <div class=\"h3\">Đáng tin<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--bb-slate);line-height:1.5\">Chất lượng ổn định, dịch vụ rõ ràng, nói gì làm nấy.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"h3\">Personality — chân dung thương hiệu<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1rem 0\">\n      <div class=\"card\" style=\"padding:1rem\"><div class=\"label\">Là<\u002Fdiv><div style=\"font-size:14px;color:var(--bb-ink);font-weight:500;margin-top:4px\">Cô bạn thân hiểu chuyện<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:1rem\"><div class=\"label\">Là<\u002Fdiv><div style=\"font-size:14px;color:var(--bb-ink);font-weight:500;margin-top:4px\">Tinh tế nhưng không kiểu cách<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:1rem\"><div class=\"label\">Là<\u002Fdiv><div style=\"font-size:14px;color:var(--bb-ink);font-weight:500;margin-top:4px\">Trẻ — nhưng không trẻ con<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:1rem;background:var(--bb-puce-tint);border-color:#f6c8d2\"><div class=\"label\" style=\"color:var(--bb-puce-deep)\">Không là<\u002Fdiv><div style=\"font-size:14px;color:var(--bb-puce-deep);font-weight:500;margin-top:4px\">Sang chảnh xa cách<\u002Fdiv><\u002Fd 200px<\u002Ftd><td>32px<\u002Ftd><td style=\"color:var(--bb-mist)\">Desktop<\u002Ftd><\u002Ftr>\n        <tr><td><b>2xl<\u002Fb><\u002Ftd><td>1536px<\u002Ftd><td>1360px<\u002Ftd><td>32px<\u002Ftd><td style=\"color:var(--bb-mist)\">Wide desktop<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"h3\">Layout patterns<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem\">\n      <div class=\"card\" style=\"padding:0;overflow:hidden\">\n        <div style=\"background:var(--bb-paper);padding:1rem;display:grid;grid-template-columns:60px 1fr;gap:.5rem;height:140px\">\n          <div style=\"background:var(--bb-obsidian);border-radius:6px\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-rows:24px 1fr;gap:.5rem\">\n            <div style=\"background:var(--bb-border);border-radius:4px\"><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid var(--bb-border);border-radius:6px\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:.75rem 1rem\"><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">App shell<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-mist)\">Sidebar + topbar + canvas — dùng cho dashboard, CQA<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:0;overflow:hidden\">\n        <div style=\"background:var(--bb-paper);padding:1rem;display:grid;grid-template-rows:32px 1fr;gap:.5rem;height:140px\">\n          <div style=\"background:#fff;border:1px solid var(--bb-border);border-radius:6px\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem\">\n            <div style=\"background:#fff;border:1px solid var(--bb-border);border-radius:6px\"><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid var(--bb-border);border-radius:6px\"><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid var(--bb-border);border-radius:6px\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:.75rem 1rem\"><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Marketing landing<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-mist)\">Header + hero + 3-col grid — dùng cho web bán hàng<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ICONOGRAPHY -->\n  <div id=\"iconography\" class=\"section\">\n    <div class=\"section-title\">Iconography<\u002Fdiv>\n    <div class=\"h2\">Hệ thống icon — Lucide style<\u002Fdiv>\n    <p class=\"lead\">Dùng bộ <b>Lucide Icons<\u002Fb> (open-source, hơn 1400 icon) làm hệ thống chính. Stroke 1.5–2px, line-cap rounded, viewBox 24×24. Không trộn icon từ nhiều bộ khác nhau.<\u002Fp>\n\n    <div class=\"card\" style=\"margin:1rem 0\">\n      <div class=\"label\">Specifications<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:.75rem;font-size:13px;color:var(--bb-slate)\">\n        <div><b style=\"color:var(--bb-ink);display:block\">Stroke<\u002Fb>1.75px (default)<\u002Fdiv>\n        <div><b style=\"color:var(--bb-ink);display:block\">Cap / join<\u002Fb>round<\u002Fdiv>\n        <div><b style=\"color:var(--bb-ink);display:block\">Grid<\u002Fb>24×24, padding 2px<\u002Fdiv>\n        <div><b style=\"color:var(--bb-ink);display:block\">Sizes<\u002Fb>16 · 20 · 24 · 32<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\">Sample icons<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(8,1fr);gap:.5rem;margin:1rem 0\">\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12l2-2 4 4 8-8 4 4\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">trending<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">heart<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"21\" r=\"1\"><\u002Fcircle><circle cx=\"20\" cy=\"21\" r=\"1\"><\u002Fcircle><path d=\"M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">cart<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">search<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">user<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">message<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 0 1-3.46 0\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">bell<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"padding:.75rem;text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:4px\">settings<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\" style=\"margin-top:1.5rem\">Sizes<\u002Fdiv>\n    <div style=\"display:flex;gap:1.5rem;align-items:flex-end;margin:1rem 0;padding:1.25rem;background:var(--bb-paper);border-radius:var(--r-lg);border:1px solid var(--bb-border)\">\n      <div style=\"text-align:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:6px\">16 · inline<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:6px\">20 · default<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:6px\">24 · prominent<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><div style=\"font-size:10px;color:var(--bb-mist);margin-top:6px\">32 · feature<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\" style=\"margin-top:1.5rem\">Don'ts<\u002Fdiv>\n    <div class=\"dont-grid\">\n      <div class=\"dont-box\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#176676\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><\u002Fsvg><div class=\"dont-label\">Filled solid<\u002Fdiv><\u002Fdiv>\n      <div class=\"dont-box\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#176676\" stroke-width=\"3\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><div class=\"dont-label\">Stroke quá dày<\u002Fdiv><\u002Fdiv>\n      <div class=\"dont-box\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D37E94\" stroke-width=\"1.75\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><div class=\"dont-label\">Đổi màu lung tung<\u002Fdiv><\u002Fdiv>\n      <div class=\"dont-box\" style=\"font-size:18px\">😍 ✨ 🌸<div class=\"dont-label\">Emoji thay icon<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- IMAGERY -->\n  <div id=\"imagery\" class=\"section\">\n    <div class=\"section-title\">Imagery &amp; Photography<\u002Fdiv>\n    <div class=\"h2\">Phong cách hình ảnh<\u002Fdiv>\n    <p class=\"lead\">Hình ảnh BEBECHIC kể câu chuyện đời thường: ánh sáng tự nhiên, tông màu ấm, không quá set up. Sản phẩm đặt trong không gian sống thực — không phải studio trắng vô trùng.<\u002Fp>\n\n    <div class=\"row\" style=\"margin-bottom:1.5rem\">\n      <div class=\"card\" style=\"padding:0;overflow:hidden\">\n        <div style=\"height:180px;background:linear-gradient(135deg,var(--bb-tiffany-50),var(--bb-tiffany-100) 50%,var(--bb-tiffany));position:relative\">\n          <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,.4) 12px,rgba(255,255,255,.4) 13px)\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:1rem;left:1rem;font-family:monospace;font-size:11px;color:var(--bb-caribbean-deep);background:rgba(255,255,255,.85);padding:4px 8px;border-radius:4px\">[ Lifestyle product shot · ánh sáng cửa sổ ]<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:1rem\"><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Lifestyle<\u002Fdiv><div style=\"font-size:12px;color:var(--bb-slate);margin-top:2px\">Sản phẩm trong tay người dùng, trên bàn cafe, cạnh cây xanh — bối cảnh thật.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:0;overflow:hidden\">\n        <div style=\"height:180px;background:#fff;position:relative;border-bottom:1px solid var(--bb-border)\">\n          <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 14px,var(--bb-paper) 14px,var(--bb-paper) 15px)\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:1rem;left:1rem;font-family:monospace;font-size:11px;color:var(--bb-slate);background:var(--bb-paper);padding:4px 8px;border-radius:4px\">[ Studio shot · nền be / off-white ]<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:1rem\"><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Product<\u002Fdiv><div style=\"font-size:12px;color:var(--bb-slate);margin-top:2px\">Nền be, off-white hoặc Paper. Không bao giờ pure white #FFF — quá lạnh.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\">Tone &amp; treatment<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin:1rem 0\">\n      <div style=\"height:90px;background:linear-gradient(135deg,#f5e8d8,#e8d4bc);border-radius:var(--r-md);display:flex;align-items:flex-end;padding:.5rem;font-size:10px;font-weight:600;color:#5a4232\">Warm beige<\u002Fdiv>\n      <div style=\"height:90px;background:linear-gradient(135deg,#dde8e3,var(--bb-tiffany-100));border-radius:var(--r-md);display:flex;align-items:flex-end;padding:.5rem;font-size:10px;font-weight:600;color:var(--bb-caribbean)\">Soft mint<\u002Fdiv>\n      <div style=\"height:90px;background:linear-gradient(135deg,#fbe8ed,#f8d4dc);border-radius:var(--r-md);display:flex;align-items:flex-end;padding:.5rem;font-size:10px;font-weight:600;color:var(--bb-puce-deep)\">Powder pink<\u002Fdiv>\n      <div style=\"height:90px;background:linear-gradient(135deg,#e8e0d0,#d4c8b0);border-radius:var(--r-md);display:flex;align-items:flex-end;padding:.5rem;font-size:10px;font-weight:600;color:#5a4f3a\">Linen / cream<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"h3\">Do &amp; Don't<\u002Fdiv>\n    <div class=\"voice-grid\">\n      <div class=\"voice-box voice-do\">\n        <div class=\"voice-tag do\">✓ Nên<\u002Fdiv>\n        <div class=\"voice-item\">Ánh sáng tự nhiên (cửa sổ, golden hour)<\u002Fdiv>\n        <div class=\"voice-item\">Bối cảnh sinh hoạt thật: bàn làm việc, phòng tắm, túi xách<\u002Fdiv>\n        <div class=\"voice-item\">Bàn tay / cử chỉ người dùng trong khung hình<\u002Fdiv>\n        <div class=\"voice-item\">Tông màu ấm, hơi ngả be / pastel<\u002Fdiv>\n        <div class=\"voice-item\">Crop chặt — close-up vào chi tiết sản phẩm<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-box voice-dont\">\n        <div class=\"voice-tag dont\">✕ Tránh<\u002Fdiv>\n        <div class=\"voice-item\">Studio trắng vô trùng (#FFF), flash gắt<\u002Fdiv>\n        <div class=\"voice-item\">Filter saturate cao, bão hòa rực rỡ<\u002Fdiv>\n        <div class=\"voice-item\">Mẫu pose quá điệu, cười gượng<\u002Fdiv>\n        <div class=\"voice-item\">Ghép sản phẩm vào background bằng AI thấy rõ<\u002Fdiv>\n        <div class=\"voice-item\">Watermark to / logo lặp lại trên ảnh<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MOTION -->\n  <div id=\"motion\" class=\"section\">\n    <div class=\"section-title\">Motion &amp; Interaction<\u002Fdiv>\n    <div class=\"h2\">Nguyên tắc chuyển động<\u002Fdiv>\n    <p class=\"lead\">Motion BEBECHIC là motion <b>\"đáng yêu mà không phiền\"<\u002Fb> — nhẹ, nhanh, có chủ đích. Mọi animation đều phục vụ feedback hoặc dẫn dắt thị giác, không trang trí.<\u002Fp>\n\n    <div class=\"row\" style=\"grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin:1rem 0\">\n      <div class=\"card\"><div class=\"label\">Duration<\u002Fdiv><div style=\"font-family:monospace;font-size:14px;color:var(--bb-ink);margin-top:6px\"><b>120ms<\u002Fb> · micro<br><b>180ms<\u002Fb> · default<br><b>280ms<\u002Fb> · entrance<br><b>400ms<\u002Fb> · stagger<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"label\">Easing<\u002Fdiv><div style=\"font-family:monospace;font-size:12px;color:var(--bb-ink);margin-top:6px\"><b>ease-out<\u002Fb> · enter<br><b>ease-in<\u002Fb> · exit<br><b>cubic-bezier(.4,0,.2,1)<\u002Fb> · all<br><b>spring(1,90,12,0)<\u002Fb> · bounce<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"label\">Distance<\u002Fdiv><div style=\"font-family:monospace;font-size:12px;color:var(--bb-ink);margin-top:6px\">slide-in: 8–16px<br>scale: .96 → 1<br>fade: 0 → 1<br>không over 24px<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\" style=\"margin-top:1.5rem\">Demo — hover các ô bên dưới<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:1rem 0\">\n      <div class=\"motion-demo\" style=\"background:var(--bb-tiffany-100);border-radius:var(--r-lg);padding:1.5rem;text-align:center;font-size:12px;font-weight:600;color:var(--bb-caribbean);transition:transform .18s cubic-bezier(.4,0,.2,1)\" onmouseover=\"this.style.transform='translateY(-4px)'\" onmouseout=\"this.style.transform=''\">Lift<br><span style=\"font-family:monospace;font-weight:400;color:var(--bb-slate);font-size:10px\">−4px · 180ms<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-demo\" style=\"background:var(--bb-tiffany-100);border-radius:var(--r-lg);padding:1.5rem;text-align:center;font-size:12px;font-weight:600;color:var(--bb-caribbean);transition:transform .18s cubic-bezier(.4,0,.2,1)\" onmouseover=\"this.style.transform='scale(1.04)'\" onmouseout=\"this.style.transform=''\">Scale<br><span style=\"font-family:monospace;font-weight:400;color:var(--bb-slate);font-size:10px\">1.04 · 180ms<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-demo\" style=\"background:var(--bb-tiffany-100);border-radius:var(--r-lg);padding:1.5rem;text-align:center;font-size:12px;font-weight:600;color:var(--bb-caribbean);transition:background .18s\" onmouseover=\"this.style.background='var(--bb-tiffany)'\" onmouseout=\"this.style.background=''\">Tint<br><span style=\"font-family:monospace;font-weight:400;color:var(--bb-slate);font-size:10px\">bg shift · 180ms<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-demo\" style=\"background:var(--bb-tiffany-100);border-radius:var(--r-lg);padding:1.5rem;text-align:center;font-size:12px;font-weight:600;color:var(--bb-caribbean);transition:box-shadow .18s\" onmouseover=\"this.style.boxShadow='0 8px 24px rgba(23,102,118,.2)'\" onmouseout=\"this.style.boxShadow=''\">Shadow<br><span style=\"font-family:monospace;font-weight:400;color:var(--bb-slate);font-size:10px\">elevation · 180ms<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\" style=\"margin-top:1.5rem\">Page transitions<\u002Fdiv>\n    <table class=\"data-table\" style=\"margin-top:.75rem;border:1px solid var(--bb-border);border-radius:var(--r-md);overflow:hidden\">\n      <thead><tr><th>Tình huống<\u002Fth><th>Animation<\u002Fth><th>Duration<\u002Fth><th>Easing<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Modal mở<\u002Ftd><td>fade-in + scale .96→1<\u002Ftd><td style=\"font-family:monospace\">200ms<\u002Ftd><td style=\"font-family:monospace\">ease-out<\u002Ftd><\u002Ftr>\n        <tr><td>Modal đóng<\u002Ftd><td>fade-out + scale 1→.96<\u002Ftd><td style=\"font-family:monospace\">140ms<\u002Ftd><td style=\"font-family:monospace\">ease-in<\u002Ftd><\u002Ftr>\n        <tr><td>Toast xuất hiện<\u002Ftd><td>slide-up 12px + fade<\u002Ftd><td style=\"font-family:monospace\">240ms<\u002Ftd><td style=\"font-family:monospace\">cubic-bezier(.4,0,.2,1)<\u002Ftd><\u002Ftr>\n        <tr><td>List item enter<\u002Ftd><td>fade + slide 8px (stagger 40ms)<\u002Ftd><td style=\"font-family:monospace\">280ms<\u002Ftd><td style=\"font-family:monospace\">ease-out<\u002Ftd><\u002Ftr>\n        <tr><td>Page route change<\u002Ftd><td>cross-fade<\u002Ftd><td style=\"font-family:monospace\">180ms<\u002Ftd><td style=\"font-family:monospace\">ease-in-out<\u002Ftd><\u002Ftr>\n        <tr><td>Loading skeleton<\u002Ftd><td>shimmer 1200ms loop<\u002Ftd><td style=\"font-family:monospace\">1200ms<\u002Ftd><td style=\"font-family:monospace\">ease-in-out<\u002Ftd><\ ưng rõ ràng, không vòng vo. Người dùng cần biết ngay họ đang làm gì.<\u002Fp>\n\n    <div class=\"voice-grid\">\n      <div class=\"voice-box voice-do\">\n        <div class=\"voice-tag do\">✓ Dùng được<\u002Fdiv>\n        <div class=\"voice-item\">Mua ngay<\u002Fdiv>\n        <div class=\"voice-item\">Thêm vào giỏ hàng<\u002Fdiv>\n        <div class=\"voice-item\">Đánh giá: Đạt ✓<\u002Fdiv>\n        <div class=\"voice-item\">2 kênh đang hoạt động<\u002Fdiv>\n        <div class=\"voice-item\">Lưu thành công<\u002Fdiv>\n        <div class=\"voice-item\">Không có dữ liệu trong khoảng thời gian này<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-box voice-dont\">\n        <div class=\"voice-tag dont\">✕ Tránh<\u002Fdiv>\n        <div class=\"voice-item\">Trải nghiệm mua sắm tuyệt vời đang chờ bạn<\u002Fdiv>\n        <div class=\"voice-item\">Khám phá bộ sưu tập phong phú của chúng tôi<\u002Fdiv>\n        <div class=\"voice-item\">Hệ thống đang xử lý yêu cầu của bạn...<\u002Fdiv>\n        <div class=\"voice-item\">Tận hưởng hành trình làm đẹp cùng BEBECHIC<\u002Fdiv>\n        <div class=\"voice-item\">Dữ liệu chưa được tải về thành công do lỗi kết nối<\u002Fdiv>\n        <div class=\"voice-item\">Vui lòng thử lại sau ít phút nữa nhé bạn ơi<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"h3\">Nguyên tắc viết microcopy<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-top:1rem\">\n      <div class=\"card\">\n        <div style=\"font-size:20px;margin-bottom:.5rem\">⚡<\u002Fdiv>\n        <div class=\"h3\">Ngắn gọn<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--bb-slate);line-height:1.6\">Button label tối đa 3 từ. Error message tối đa 1 câu. Placeholder hint chứ không giải thích.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div style=\"font-size:20px;margin-bottom:.5rem\">🎯<\u002Fdiv>\n        <div class=\"h3\">Hướng đến hành động<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--bb-slate);line-height:1.6\">Dùng động từ: Lưu, Tạo, Xóa, Xuất, Nhập. Tránh danh từ thụ động: Lưu trữ, Khởi tạo.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div style=\"font-size:20px;margin-bottom:.5rem\">💬<\u002Fdiv>\n        <div class=\"h3\">Gần gũi, không sến<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--bb-slate);line-height:1.6\">Xưng \"bạn\", không xưng \"quý khách\". Tone thân thiện nhưng professional — không dùng emoji trong error.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SOCIAL TEMPLATES -->\n  <div id=\"social\" class=\"section\">\n    <div class=\"section-title\">Social &amp; Marketing Templates<\u002Fdiv>\n    <div class=\"h2\">Khung mẫu cho social media<\u002Fdiv>\n    <p class=\"lead\">Áp dụng brand system vào các kênh phổ biến: Facebook, Instagram, TikTok cover, email header. Giữ tỷ lệ logo, khoảng trắng và quy tắc 60/30/10.<\u002Fp>\n\n    <div class=\"h3\">Instagram Post — 1:1<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1rem 0\">\n      <div style=\"aspect-ratio:1;background:var(--bb-tiffany);border-radius:var(--r-lg);padding:1.25rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden\">\n        <div style=\"font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bb-caribbean-deep)\">New arrival<\u002Fdiv>\n        <div>\n          <div style=\"font-size:22px;font-weight:700;color:var(--bb-caribbean-deep);line-height:1.1;letter-spacing:-.01em\">Nhỏ mà chất.<br>Dùng mỗi ngày.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <img src=\"765a520b-fb32-4169-bc8c-b9083eee2aa8\" alt=\"BEBECHIC\" style=\"height:13px;width:auto;display:block\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:var(--bb-puce-deep)\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"aspect-ratio:1;background:var(--bb-obsidian);border-radius:var(--r-lg);padding:1.25rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(143,216,195,.18),transparent 70%)\"><\u002Fdiv>\n        <div style=\"font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bb-tiffany)\">Sale tuần này<\u002Fdiv>\n        <div>\n          <div style=\"font-size:36px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.02em\">−30<span style=\"color:var(--bb-puce)\">%<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,.6);margin-top:6px\">Toàn bộ phụ kiện<\u002Fdiv>\n        <\u002Fdiv>\n        <img src=\"bb65b32c-dc04-4819-a2c7-549822387c41\" alt=\"BEBECHIC\" style=\"height:13px;width:auto;display:block\">\n      <\u002Fdiv>\n      <div style=\"aspect-ratio:1;background:var(--bb-paper);border-radius:var(--r-lg);padding:1.25rem;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--bb-border)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bb-tiffany-dark)\">Tip · 03<\u002Fdiv>\n          <img src=\"765a520b-fb32-4169-bc8c-b9083eee2aa8\" alt=\"BEBECHIC\" style=\"height:13px;width:auto;display:block\">\n        <\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:600;color:var(--bb-obsidian);line-height:1.3;letter-spacing:-.005em\">Cách bảo quản<br>quần tất bền lâu<br><span style=\"color:var(--bb-tiffany-dark)\">→ swipe để xem<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:4px\"><div style=\"width:24px;height:3px;background:v r:var(--bb-slate)\">design@bebechic.vn<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">Asset Library<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--bb-ink);margin-top:6px;line-height:1.6\">Logo · Font · Photo bank<br>Component code (Figma + GitHub)<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--bb-tiffany-dark);margin-top:6px;font-weight:600\">brand.bebechic.vn/assets<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h3\">Quy trình duyệt ấn phẩm<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:1rem 0;align-items:stretch\">\n      <div class=\"card\" style=\"text-align:center\"><div style=\"width:32px;height:32px;border-radius:50%;background:var(--bb-tiffany-100);color:var(--bb-caribbean);display:flex;align-items:center;justify-content:center;margin:0 auto .5rem;font-weight:700;font-size:13px\">1<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Brief<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-slate);margin-top:4px\">Mục tiêu, kênh, audience<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\"><div style=\"width:32px;height:32px;border-radius:50%;background:var(--bb-tiffany-100);color:var(--bb-caribbean);display:flex;align-items:center;justify-content:center;margin:0 auto .5rem;font-weight:700;font-size:13px\">2<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Draft<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-slate);margin-top:4px\">Áp guideline, check 60/30/10<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\"><div style=\"width:32px;height:32px;border-radius:50%;background:var(--bb-tiffany-100);color:var(--bb-caribbean);display:flex;align-items:center;justify-content:center;margin:0 auto .5rem;font-weight:700;font-size:13px\">3<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Brand review<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-slate);margin-top:4px\">Team Brand approve<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"text-align:center\"><div style=\"width:32px;height:32px;border-radius:50%;background:var(--bb-tiffany);color:var(--bb-caribbean-deep);display:flex;align-items:center;justify-content:center;margin:0 auto .5rem;font-weight:700;font-size:13px\">4<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:var(--bb-ink)\">Publish<\u002Fdiv><div style=\"font-size:11px;color:var(--bb-slate);margin-top:4px\">Lưu vào Asset Library<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"h3\">Versioning<\u002Fdiv>\n    <table class=\"data-table\" style=\"margin-top:.75rem;border:1px solid var(--bb-border);border-radius:var(--r-md);overflow:hidden\">\n      <thead><tr><th>Version<\u002Fth><th>Ngày<\u002Fth><th>Phạm vi<\u002Fth><th>Người duyệt<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><b>v1.0<\u002Fb><\u002Ftd><td style=\"color:var(--bb-mist)\">2024-08<\u002Ftd><td>Logo · Color · Print<\u002Ftd><td>Founder<\u002Ftd><\u002Ftr>\n        <tr><td><b>v1.5<\u002Fb><\u002Ftd><td style=\"color:var(--bb-mist)\">2025-03<\u002Ftd><td>Bổ sung packaging, social kit<\u002Ftd><td>Brand team<\u002Ftd><\u002Ftr>\n        <tr><td style=\"color:var(--bb-tiffany-dark)\"><b>v2.0 Digital<\u002Fb><\u002Ftd><td style=\"color:var(--bb-mist)\">2026-05<\u002Ftd><td>Web/app system, components, motion, a11y<\u002Ftd><td>Brand + Product<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"card\" style=\"margin-top:1.5rem;background:var(--bb-obsidian);color:#fff;border-color:transparent;text-align:center;padding:2rem\">\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bb-tiffany);margin-bottom:.5rem\">Cảm ơn vì đã giữ chuẩn brand<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;color:#fff;line-height:1.3;letter-spacing:-.01em\">Một thương hiệu nhất quán<br>được xây bởi từng người trong đội.<\u002Fdiv>\n      <div style=\"font-size:13px;color:rgba(255,255,255,.5);margin-top:1rem\">© 2026 BEBECHIC. Brand Guidelines v2.0 — Digital Edition.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\nfunction show(id, btn) {\n  document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));\n  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));\n  document.getElementById(id).classList.add('show');\n  btn.classList.add('active');\n}\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
